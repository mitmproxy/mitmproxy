<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>mitmproxy</title>
        <link rel="icon" href="static/favicon.ico" type="image/x-icon" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            (function () {
                try {
                    var theme =
                        localStorage.getItem("mitmproxy-theme") || "system";
                    var activeTheme = theme;
                    if (theme === "system") {
                        activeTheme = window.matchMedia(
                            "(prefers-color-scheme: dark)",
                        ).matches
                            ? "dark"
                            : "light";
                    }
                    document.documentElement.setAttribute(
                        "data-theme",
                        activeTheme,
                    );
                } catch (e) {}
            })();
        </script>
        <link rel="stylesheet" href="src/css/vendor.less" />
        <link rel="stylesheet" href="src/css/app.less" />
        <script type="module" src="src/js/app.tsx"></script>
    </head>
    <body>
        <div id="mitmproxy"></div>
    </body>
</html>
